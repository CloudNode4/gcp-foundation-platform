name: terraform-plan

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: Organization config file
        required: true
        default: config/example.organization.yaml
  pull_request:
    paths:
      - 'terraform/**'
      - 'config/**'
      - 'src/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  plan:
    name: terraform-plan
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Generate tfvars
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file || 'config/example.organization.yaml' }}"
          gcp-foundation validate-config --config "$CONFIG_FILE"
          gcp-foundation generate-tfvars \
            --config "$CONFIG_FILE" \
            --output terraform/foundation/terraform.auto.tfvars.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=terraform/foundation init

      - name: Terraform plan
        run: terraform -chdir=terraform/foundation plan -input=false
