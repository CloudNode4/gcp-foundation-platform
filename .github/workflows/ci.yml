name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: python-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff
        run: |
          ruff format --check src tests
          ruff check src tests

      - name: Unit tests
        run: python -m pytest

      - name: Repository structure check
        run: python -m gcp_foundation check-repo --path .

  terraform:
    name: terraform-static-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.7
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init without backend
        run: terraform -chdir=terraform/foundation init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/foundation validate
